<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Pong Challenge</title>

    <style>
        body {
          margin: 0;
          background: #111;
          font-family: Arial, sans-serif;
          color: white;
          text-align: center;
          overflow: hidden;
        }

        h1 {
          margin-top: 15px;
        }

        canvas {
          display: block;
          margin: 20px auto;
          background: black;
          border: 3px solid white;
        }

        /* FULL SCREEN END OVERLAY */
        #overlay {
          position: fixed;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          background: black;
          display: none;
          justify-content: center;
          align-items: center;
          flex-direction: column;
          z-index: 999;
        }

        #overlay h2 {
          font-size: 40px;
          margin-bottom: 20px;
        }

        #overlay a {
          color: #00ffcc;
          font-size: 26px;
          text-decoration: none;
        }

        #overlay a:hover {
          text-decoration: underline;
        }

        #overlay button {
          margin-top: 20px;
          padding: 10px 20px;
          font-size: 18px;
          cursor: pointer;
        }
    </style>
</head>

<body>

<h1>Pong Challenge</h1>
<p>Win to proceed in Lassi Rank Hunt..</p>

<canvas id="game" width="900" height="500"></canvas>

<div id="overlay"></div>

<script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const overlay = document.getElementById("overlay");

    const paddleWidth = 12;
    const paddleHeight = 110;

    const player = {
      x: 20,
      y: canvas.height / 2 - paddleHeight / 2,
      width: paddleWidth,
      height: paddleHeight,
      speed: 7
    };

    const ai = {
      x: canvas.width - 32,
      y: canvas.height / 2 - paddleHeight / 2,
      width: paddleWidth,
      height: paddleHeight,
      speed: 2.2
    };

    const ball = {
      x: canvas.width / 2,
      y: canvas.height / 2,
      radius: 10,
      speed: 5,
      velocityX: 5,
      velocityY: 2
    };

    let playerScore = 0;
    let aiScore = 0;
    let gameRunning = true;

    const keys = {};

    document.addEventListener("keydown", e => keys[e.key] = true);
    document.addEventListener("keyup", e => keys[e.key] = false);

    function drawRect(x, y, w, h) {
      ctx.fillStyle = "white";
      ctx.fillRect(x, y, w, h);
    }

    function drawCircle(x, y, r) {
      ctx.fillStyle = "white";
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawText(text, x, y) {
      ctx.fillStyle = "white";
      ctx.font = "32px Arial";
      ctx.fillText(text, x, y);
    }

    function resetBall(dir = 1) {
      ball.x = canvas.width / 2;
      ball.y = canvas.height / 2;
      ball.speed = 5;
      ball.velocityX = 5 * dir;
      ball.velocityY = (Math.random() * 4) - 2;
    }

    function collision(b, p) {
      return (
        b.x - b.radius < p.x + p.width &&
        b.x + b.radius > p.x &&
        b.y - b.radius < p.y + p.height &&
        b.y + b.radius > p.y
      );
    }

    function update() {
      if (keys["w"] || keys["ArrowUp"]) player.y -= player.speed;
      if (keys["s"] || keys["ArrowDown"]) player.y += player.speed;

      player.y = Math.max(0, Math.min(canvas.height - player.height, player.y));

      let aiCenter = ai.y + ai.height / 2;

      if (Math.random() > 0.08) {
        if (aiCenter < ball.y - 35) ai.y += ai.speed;
        else if (aiCenter > ball.y + 35) ai.y -= ai.speed;
      }

      ai.y = Math.max(0, Math.min(canvas.height - ai.height, ai.y));

      ball.x += ball.velocityX;
      ball.y += ball.velocityY;

      if (ball.y <= 0 || ball.y >= canvas.height) ball.velocityY *= -1;

      let paddle = (ball.x < canvas.width / 2) ? player : ai;

      if (collision(ball, paddle)) {
        let collidePoint = (ball.y - (paddle.y + paddle.height / 2)) / (paddle.height / 2);
        let angle = (Math.PI / 4) * collidePoint;

        let dir = (ball.x < canvas.width / 2) ? 1 : -1;

        ball.speed += 0.2;

        ball.velocityX = dir * ball.speed * Math.cos(angle);
        ball.velocityY = ball.speed * Math.sin(angle);
      }

      if (ball.x < 0) {
        aiScore++;
        resetBall(1);
      }

      if (ball.x > canvas.width) {
        playerScore++;
        resetBall(-1);
      }

      if (playerScore >= 5) endGame(true);
      if (aiScore >= 5) endGame(false);
    }

    function render() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      for (let i = 0; i < canvas.height; i += 25) {
        drawRect(canvas.width / 2 - 2, i, 4, 15);
      }

      drawRect(player.x, player.y, player.width, player.height);
      drawRect(ai.x, ai.y, ai.width, ai.height);
      drawCircle(ball.x, ball.y, ball.radius);

      drawText(playerScore, canvas.width / 4, 50);
      drawText(aiScore, canvas.width * 3 / 4, 50);
    }

    function endGame(playerWon) {
      gameRunning = false;
      canvas.style.display = "none";

      overlay.style.display = "flex";

      if (playerWon) {
        overlay.innerHTML = `
          <h2>You Win!</h2>
          <p>Click this link to proceed:</p>
          <a href="https://discord.gg/MUPuwfKGt" target="_blank">
            https://discord.gg/MUPuwfKGt
          </a>
        `;
      } else {
        overlay.innerHTML = `
          <h2>You Lost</h2>
          <p>Try again to proceed</p>
          <button onclick="location.reload()">Restart</button>
        `;
      }
    }

    function loop() {
      if (!gameRunning) return;
      update();
      render();
      requestAnimationFrame(loop);
    }

    resetBall();
    loop();
</script>

</body>
</html>
