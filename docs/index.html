<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Pong Challenge</title>

    <style>
        body {
          margin: 0;
          background: #111;
          overflow: hidden;
          font-family: Arial, sans-serif;
          color: white;
          text-align: center;
        }

        canvas {
          display: block;
          margin: 20px auto;
          background: black;
          border: 3px solid white;
        }

        #message {
          font-size: 24px;
          margin-top: 10px;
        }

        a {
          color: #00ffcc;
          font-size: 22px;
          text-decoration: none;
        }

        a:hover {
          text-decoration: underline;
        }
    </style>
</head>
<body>

<h1>Pong Challenge</h1>
<p>First to 5 wins</p>
<p>Controls: W/S or Arrow Keys</p>

<canvas id="game" width="900" height="500"></canvas>

<div id="message"></div>

<script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    const paddleWidth = 12;
    const paddleHeight = 110;

    const player = {
      x: 20,
      y: canvas.height / 2 - paddleHeight / 2,
      width: paddleWidth,
      height: paddleHeight,
      speed: 7
    };

    const ai = {
      x: canvas.width - 32,
      y: canvas.height / 2 - paddleHeight / 2,
      width: paddleWidth,
      height: paddleHeight,
      speed: 4.5
    };

    const ball = {
      x: canvas.width / 2,
      y: canvas.height / 2,
      radius: 10,
      speed: 5,
      velocityX: 5,
      velocityY: 2
    };

    let playerScore = 0;
    let aiScore = 0;
    let gameRunning = true;

    const keys = {};

    document.addEventListener("keydown", e => {
      keys[e.key] = true;
    });

    document.addEventListener("keyup", e => {
      keys[e.key] = false;
    });

    function drawRect(x, y, w, h, color="white") {
      ctx.fillStyle = color;
      ctx.fillRect(x, y, w, h);
    }

    function drawCircle(x, y, r, color="white") {
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawText(text, x, y) {
      ctx.fillStyle = "white";
      ctx.font = "32px Arial";
      ctx.fillText(text, x, y);
    }

    function resetBall(direction = 1) {
      ball.x = canvas.width / 2;
      ball.y = canvas.height / 2;

      ball.speed = 5;

      ball.velocityX = 5 * direction;
      ball.velocityY = (Math.random() * 4) - 2;
    }

    function collision(ball, paddle) {
      return (
        ball.x - ball.radius < paddle.x + paddle.width &&
        ball.x + ball.radius > paddle.x &&
        ball.y - ball.radius < paddle.y + paddle.height &&
        ball.y + ball.radius > paddle.y
      );
    }

    function update() {
      // PLAYER MOVEMENT
      if (keys["w"] || keys["ArrowUp"]) {
        player.y -= player.speed;
      }

      if (keys["s"] || keys["ArrowDown"]) {
        player.y += player.speed;
      }

      player.y = Math.max(0, Math.min(canvas.height - player.height, player.y));

      // AI MOVEMENT
      let aiCenter = ai.y + ai.height / 2;

      if (aiCenter < ball.y - 20) {
        ai.y += ai.speed;
      } else if (aiCenter > ball.y + 20) {
        ai.y -= ai.speed;
      }

      // BALL MOVEMENT
      ball.x += ball.velocityX;
      ball.y += ball.velocityY;

      // WALL BOUNCE
      if (ball.y - ball.radius <= 0 || ball.y + ball.radius >= canvas.height) {
        ball.velocityY *= -1;
      }

      // PADDLE COLLISION
      let currentPaddle = (ball.x < canvas.width / 2) ? player : ai;

      if (collision(ball, currentPaddle)) {

        // Where ball hit paddle
        let collidePoint =
          ball.y - (currentPaddle.y + currentPaddle.height / 2);

        // Normalize between -1 and 1
        collidePoint = collidePoint / (currentPaddle.height / 2);

        // Max bounce angle = 45 degrees
        let angleRad = (Math.PI / 4) * collidePoint;

        // Direction
        let direction = (ball.x < canvas.width / 2) ? 1 : -1;

        // Slight speed increase each hit
        ball.speed += 0.25;

        // New velocity
        ball.velocityX = direction * ball.speed * Math.cos(angleRad);
        ball.velocityY = ball.speed * Math.sin(angleRad);
      }

      // SCORE
      if (ball.x < 0) {
        aiScore++;
        resetBall(1);
      }

      if (ball.x > canvas.width) {
        playerScore++;
        resetBall(-1);
      }

      // WIN CONDITION
      if (playerScore >= 5) {
        endGame(true);
      }

      if (aiScore >= 5) {
        endGame(false);
      }
    }

    function render() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Middle dashed line
      for (let i = 0; i < canvas.height; i += 25) {
        drawRect(canvas.width / 2 - 2, i, 4, 15, "gray");
      }

      drawRect(player.x, player.y, player.width, player.height);
      drawRect(ai.x, ai.y, ai.width, ai.height);

      drawCircle(ball.x, ball.y, ball.radius);

      drawText(playerScore, canvas.width / 4, 50);
      drawText(aiScore, canvas.width * 3 / 4, 50);
    }

    function endGame(playerWon) {
      gameRunning = false;

      const message = document.getElementById("message");

      if (playerWon) {
        message.innerHTML = `
          <h2>You Win!</h2>
          <a href="https://discord.gg/52nR7Rrr2t" target="_blank">
            Join the Discord
          </a>
        `;
      } else {
        message.innerHTML = `
          <h2>AI Wins</h2>
          <p>Refresh to try again</p>
        `;
      }
    }

    function gameLoop() {
      if (!gameRunning) return;

      update();
      render();

      requestAnimationFrame(gameLoop);
    }

    resetBall();
    gameLoop();
</script>

</body>
</html>
