<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Pong Challenge</title>

    <style>
        body {
          margin: 0;
          background: #111;
          overflow: hidden;
          font-family: Arial, sans-serif;
          color: white;
          text-align: center;
        }

        canvas {
          display: block;
          margin: 20px auto;
          background: black;
          border: 3px solid white;
        }

        #message {
          font-size: 24px;
          margin-top: 10px;
        }

        a {
          color: #00ffcc;
          font-size: 22px;
          text-decoration: none;
        }

        a:hover {
          text-decoration: underline;
        }
    </style>
</head>
<body>

<h1>Pong Challenge</h1>
<p>First to 5 wins.</p>

<canvas id="game" width="800" height="500"></canvas>

<div id="message"></div>

<script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    const paddleWidth = 12;
    const paddleHeight = 100;

    const player = {
      x: 10,
      y: canvas.height / 2 - paddleHeight / 2,
      width: paddleWidth,
      height: paddleHeight,
      speed: 7
    };

    const ai = {
      x: canvas.width - 22,
      y: canvas.height / 2 - paddleHeight / 2,
      width: paddleWidth,
      height: paddleHeight,
      speed: 4
    };

    const ball = {
      x: canvas.width / 2,
      y: canvas.height / 2,
      radius: 10,
      speedX: 5,
      speedY: 5
    };

    let playerScore = 0;
    let aiScore = 0;

    const keys = {};

    document.addEventListener("keydown", (e) => {
      keys[e.key] = true;
    });

    document.addEventListener("keyup", (e) => {
      keys[e.key] = false;
    });

    function drawRect(x, y, w, h, color="white") {
      ctx.fillStyle = color;
      ctx.fillRect(x, y, w, h);
    }

    function drawCircle(x, y, r, color="white") {
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawText(text, x, y) {
      ctx.fillStyle = "white";
      ctx.font = "32px Arial";
      ctx.fillText(text, x, y);
    }

    function resetBall() {
      ball.x = canvas.width / 2;
      ball.y = canvas.height / 2;

      ball.speedX = -ball.speedX;
      ball.speedY = (Math.random() * 6) - 3;
    }

    function update() {
      // Player movement
      if (keys["w"] || keys["ArrowUp"]) {
        player.y -= player.speed;
      }

      if (keys["s"] || keys["ArrowDown"]) {
        player.y += player.speed;
      }

      // Keep player inside screen
      if (player.y < 0) player.y = 0;
      if (player.y + player.height > canvas.height)
        player.y = canvas.height - player.height;

      // AI movement
      const aiCenter = ai.y + ai.height / 2;

      if (aiCenter < ball.y - 35) {
        ai.y += ai.speed;
      } else if (aiCenter > ball.y + 35) {
        ai.y -= ai.speed;
      }

      // Ball movement
      ball.x += ball.speedX;
      ball.y += ball.speedY;

      // Top/bottom bounce
      if (ball.y - ball.radius < 0 || ball.y + ball.radius > canvas.height) {
        ball.speedY *= -1;
      }

      // Paddle collision
      const paddles = [player, ai];

      paddles.forEach((paddle) => {
        if (
          ball.x - ball.radius < paddle.x + paddle.width &&
          ball.x + ball.radius > paddle.x &&
          ball.y - ball.radius < paddle.y + paddle.height &&
          ball.y + ball.radius > paddle.y
        ) {
          ball.speedX *= -1.05;
        }
      });

      // Scoring
      if (ball.x < 0) {
        aiScore++;
        resetBall();
      }

      if (ball.x > canvas.width) {
        playerScore++;
        resetBall();
      }

      // Win condition
      if (playerScore >= 5) {
        endGame(true);
      }

      if (aiScore >= 5) {
        endGame(false);
      }
    }

    function render() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Middle line
      for (let i = 0; i < canvas.height; i += 25) {
        drawRect(canvas.width / 2 - 2, i, 4, 15, "gray");
      }

      drawRect(player.x, player.y, player.width, player.height);
      drawRect(ai.x, ai.y, ai.width, ai.height);

      drawCircle(ball.x, ball.y, ball.radius);

      drawText(playerScore, canvas.width / 4, 50);
      drawText(aiScore, canvas.width * 3/4, 50);
    }

    let gameRunning = true;

    function gameLoop() {
      if (!gameRunning) return;

      update();
      render();

      requestAnimationFrame(gameLoop);
    }

    function endGame(playerWon) {
      gameRunning = false;

      const message = document.getElementById("message");

      if (playerWon) {
        message.innerHTML = `
          <h2>You Win!</h2>
          <a href="https://discord.gg/52nR7Rrr2t" target="_blank">
            Join the Discord
          </a>
        `;
      } else {
        message.innerHTML = `<h2>AI Wins. Refresh to try again.</h2>`;
      }
    }

    gameLoop();
</script>

</body>
</html>
